lzc-sdk-version: 0.1
name: ISO管理器
package: cloud.lazybird.app.lazyiso
version: 0.1.0
description: 
license: https://choosealicense.com/licenses/mit/
homepage: 
author: Lazy Bird
usage: "早起的鸟儿有虫吃。\nEarly bird has bugs.\nLazy Bird No Bug!\n"
application:
  multi_instance: true
  subdomain: lazyiso
  routes:
    - /=file:///lzcapp/pkg/content/web
    - /api/=exec://3000,/lzcapp/pkg/content/lazyiso --db /lzcapp/var/lazyiso.db
  file_handler:
    mime:
      - application/x-cd-image
    actions:
      open: /open?file=%u
ext_config:
  enable_media_access: true
locales:
  zh:
    name: "ISO Manager"
    description: "ISO Manager 用于批量管理和迁移 ISO 文件"
  zh_CN:
    name: "ISO Manager"
    description: "ISO Manager 用于批量管理和迁移 ISO 文件"